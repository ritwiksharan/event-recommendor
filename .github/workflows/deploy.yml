name: Deploy to Cloud Run

on:
  push:
    branches:
      - fastapi-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t us-central1-docker.pkg.dev/eventscouts-project/eventscout/app:${{ github.sha }} .
          docker push us-central1-docker.pkg.dev/eventscouts-project/eventscout/app:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: eventscout
          region: us-central1
          image: us-central1-docker.pkg.dev/eventscouts-project/eventscout/app:${{ github.sha }}
          env_vars: |
            VERTEXAI_PROJECT=eventscouts-project
            VERTEXAI_LOCATION=us-central1
